<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sign In · Nexus Study Lab</title>

  <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  DISCORD ACTIVITY CSP COMPLIANCE — FULL AUDIT                   ║
    ║                                                                  ║
    ║  WHAT IS BLOCKED BY DISCORD:                                     ║
    ║  • Any CDN script (esm.sh, gstatic, fonts.googleapis, etc.)     ║
    ║  • Firebase modular SDK (lazy-loads blob: scripts → CSP kill)   ║
    ║  • Google Sign-In / OAuth popup (external origin)               ║
    ║  • Direct fetch() to external domains (worker, firebase, etc.)  ║
    ║  • Inline event handlers (onclick, onkeydown attrs)              ║
    ║  • type="module" with external import URLs                       ║
    ║                                                                  ║
    ║  WHAT WORKS IN DISCORD:                                          ║
    ║  • Local bundle scripts: js/discord-sdk-bundle.js               ║
    ║  • Local bundle scripts: js/firebase-bundle.js  (compat build)  ║
    ║  • Relative fetch() paths proxied via Discord URL Mappings       ║
    ║  • patchUrlMappings() for firebase/worker rewriting              ║
    ║  • Self-hosted fonts from fonts/ directory                       ║
    ║  • localStorage (no cookies needed for auth state)              ║
    ║                                                                  ║
    ║  DISCORD URL MAPPINGS REQUIRED (Developer Portal):              ║
    ║  /worker  →  green-thunder-d974.priyan-node.workers.dev         ║
    ║  /firebase → firestore.googleapis.com  (if Firestore used)     ║
    ║                                                                  ║
    ║  BUILD COMMANDS:                                                 ║
    ║  Discord SDK bundle:                                             ║
    ║    npm install @discord/embedded-app-sdk                        ║
    ║    npx esbuild node_modules/@discord/embedded-app-sdk/          ║
    ║      output/embedded-app-sdk.js --bundle --format=iife          ║
    ║      --global-name=DiscordSDKLib --outfile=js/discord-sdk-bundle.js --minify  ║
    ║                                                                  ║
    ║  Firebase bundle (compat — no lazy blob: loading):              ║
    ║    See existing firebase-bundle.js build process                ║
    ╚══════════════════════════════════════════════════════════════════╝
  -->

  <!-- Self-hosted fonts only — no Google Fonts CDN (blocked by Discord CSP) -->
  <link href="fonts/fonts.css" rel="stylesheet">

  <style>
    /* ── Design tokens ────────────────────────────────────────────── */
    :root {
      --bg:          #080604;
      --bg2:         #0e0b07;
      --accent:      #e8a060;
      --accent2:     #f0c080;
      --accent-dim:  rgba(232,160,96,0.45);
      --accent-glow: rgba(232,160,96,0.12);
      --border:      rgba(255,220,160,0.09);
      --border-warm: rgba(255,200,120,0.24);
      --text:        #f0e8dc;
      --muted:       rgba(240,232,220,0.42);
      --muted2:      rgba(240,232,220,0.22);
      --error:       rgba(224,110,90,0.88);
      --success:     rgba(110,200,150,0.88);
      --radius:      14px;
      --radius-lg:   28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background layer (pointer-events: none — never blocks clicks) ── */
    #deco-layer {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; user-select: none;
    }
    #particle-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 85% 75% at 50% 50%, transparent 25%, rgba(4,2,1,0.82) 100%);
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px);
      animation: orb-drift ease-in-out infinite;
    }
    .orb-1 { width:520px;height:520px;background:radial-gradient(circle,rgba(232,140,60,0.065) 0%,transparent 70%);top:-180px;left:-120px;animation-duration:20s; }
    .orb-2 { width:420px;height:420px;background:radial-gradient(circle,rgba(160,90,200,0.045) 0%,transparent 70%);bottom:-120px;right:-90px;animation-duration:26s;animation-delay:-10s; }
    .orb-3 { width:360px;height:360px;background:radial-gradient(circle,rgba(240,192,128,0.038) 0%,transparent 70%);top:55%;left:58%;animation-duration:22s;animation-delay:-5s; }
    @keyframes orb-drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(28px,-18px) scale(1.04); }
      66%      { transform: translate(-18px,26px) scale(0.96); }
    }

    /* ── UI layer ─────────────────────────────────────────────────── */
    #ui-layer {
      position: relative; z-index: 10;
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    }

    /* ── Card ─────────────────────────────────────────────────────── */
    .card {
      width: min(420px, 100%);
      background: rgba(255,228,175,0.047);
      border: 1px solid rgba(255,210,140,0.13);
      border-radius: var(--radius-lg);
      padding: 44px 44px 36px;
      backdrop-filter: blur(48px) saturate(140%);
      -webkit-backdrop-filter: blur(48px) saturate(140%);
      box-shadow:
        0 0 0 1px rgba(255,220,160,0.04) inset,
        0 0 90px rgba(232,160,96,0.055),
        0 44px 90px rgba(0,0,0,0.6);
      animation: card-rise 0.9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes card-rise {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── Brand ────────────────────────────────────────────────────── */
    .brand { text-align: center; margin-bottom: 26px; animation: fade-up 0.8s 0.15s both; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: .66rem; letter-spacing: 6px; text-transform: uppercase;
      color: var(--muted2); margin-bottom: 14px;
    }
    .brand-logo {
      width: 50px; height: 50px; border-radius: 15px;
      background: linear-gradient(135deg, rgba(232,160,96,0.20), rgba(240,192,128,0.09));
      border: 1px solid rgba(232,160,96,0.26);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      animation: logo-pulse 3.5s ease-in-out infinite;
    }
    @keyframes logo-pulse {
      0%,100% { box-shadow: 0 0 28px rgba(232,160,96,0.10), inset 0 1px 0 rgba(255,220,160,0.18); }
      50%      { box-shadow: 0 0 44px rgba(232,160,96,0.20), inset 0 1px 0 rgba(255,220,160,0.28); }
    }
    .brand-logo svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 300; letter-spacing: 1px; color: var(--text); line-height: 1; margin-bottom: 5px; }
    .brand-name em { font-style: italic; color: var(--accent); }
    .brand-sub { font-size: .71rem; color: var(--muted); letter-spacing: .5px; }

    /* ── Bundle error banner (shown if js/firebase-bundle.js missing) ── */
    .bundle-error {
      display: none;
      font-size: .65rem; color: rgba(220,110,90,0.92); text-align: center;
      letter-spacing: .3px; line-height: 1.65; margin-bottom: 14px;
      padding: 10px 14px; border-radius: 10px;
      background: rgba(210,80,60,0.07); border: 1px solid rgba(210,80,60,0.18);
    }

    /* ── Social buttons row ───────────────────────────────────────── */
    .social-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 18px;
      animation: fade-up 0.8s 0.25s both;
    }
    .btn-social {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      padding: 11px 14px; min-height: 44px;
      border-radius: var(--radius); border: 1px solid var(--border);
      background: rgba(255,235,200,0.03);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: .70rem;
      letter-spacing: 1.4px; text-transform: uppercase;
      cursor: pointer; transition: all .3s;
      /* No inline onclick — listeners added via addEventListener */
      -webkit-tap-highlight-color: transparent;
    }
    .btn-social svg       { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-social:hover     { border-color: var(--border-warm); color: var(--text); background: rgba(255,235,200,0.055); transform: translateY(-1px); }
    .btn-social:active    { transform: translateY(0); opacity: .85; }
    .btn-social:disabled  { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-google:hover     { border-color: rgba(66,133,244,.32); box-shadow: 0 4px 18px rgba(66,133,244,.07); }
    .btn-discord:hover    { border-color: rgba(88,101,242,.38); box-shadow: 0 4px 18px rgba(88,101,242,.09); }

    /* ── Divider ──────────────────────────────────────────────────── */
    .divider-or {
      text-align: center; font-size: .60rem; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted2); margin: 0 0 16px; position: relative;
      animation: fade-up 0.8s 0.3s both;
    }
    .divider-or::before, .divider-or::after {
      content: ''; position: absolute; top: 50%; height: 1px;
      background: var(--border); width: calc(50% - 18px);
    }
    .divider-or::before { left: 0; }
    .divider-or::after  { right: 0; }

    /* ── Tabs ─────────────────────────────────────────────────────── */
    .tabs {
      display: flex; margin-bottom: 18px;
      background: rgba(255,235,200,0.035); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 3px;
      animation: fade-up 0.8s 0.35s both;
    }
    .tab {
      flex: 1; padding: 9px; min-height: 38px;
      text-align: center; font-family: 'DM Sans', sans-serif;
      font-size: .67rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); cursor: pointer; border-radius: 11px;
      transition: all .3s; border: none; background: transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: rgba(232,160,96,0.13);
      border: 1px solid rgba(232,160,96,0.26);
      color: var(--accent2);
    }

    /* ── Form fields ──────────────────────────────────────────────── */
    .form { animation: fade-up 0.8s 0.4s both; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 11px; }
    .field label { font-size: .61rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); }
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted2); font-size: 13px; pointer-events: none;
      transition: color .3s; user-select: none;
    }
    .field input {
      width: 100%;
      background: rgba(255,235,200,0.038); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px 12px 40px;
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 300;
      color: var(--text); outline: none;
      transition: border-color .3s, background .3s, box-shadow .3s;
      caret-color: var(--accent);
      /* Prevent iOS zoom */
      -webkit-appearance: none; appearance: none;
    }
    .field input::placeholder { color: var(--muted2); }
    .field input:focus {
      border-color: var(--border-warm);
      background: rgba(255,235,200,0.055);
      box-shadow: 0 0 0 3px rgba(232,160,96,0.055);
    }
    .field-wrap:focus-within .field-icon { color: var(--accent-dim); }

    #register-name-field { display: none; }

    .forgot-row { text-align: right; margin: -2px 0 8px; }
    .forgot-link {
      font-size: .63rem; color: var(--muted2); letter-spacing: .4px;
      cursor: pointer; transition: color .2s;
      background: none; border: none; font-family: 'DM Sans', sans-serif;
      min-height: 36px; padding: 8px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .forgot-link:hover { color: var(--muted); }

    /* ── Primary CTA ──────────────────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 14px; min-height: 48px; margin-top: 14px;
      background: linear-gradient(135deg, rgba(232,160,96,0.18), rgba(240,192,128,0.11));
      border: 1px solid rgba(232,160,96,0.36); border-radius: var(--radius);
      color: var(--accent2); font-family: 'DM Sans', sans-serif;
      font-size: .71rem; font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all .3s; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:hover    { border-color: rgba(232,160,96,.58); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(232,160,96,.13); }
    .btn-primary:active   { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .section-div {
      text-align: center; font-size: .60rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted2);
      margin: 12px 0 8px; position: relative;
    }
    .section-div::before, .section-div::after {
      content: ''; position: absolute; top: 50%; height: 1px;
      background: var(--border); width: calc(50% - 16px);
    }
    .section-div::before { left: 0; }
    .section-div::after  { right: 0; }

    .btn-guest {
      width: 100%; padding: 11px; min-height: 44px;
      background: transparent; border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: .67rem; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all .3s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-guest:hover { border-color: var(--border-warm); color: var(--text); background: rgba(255,235,200,0.03); }

    /* ── Message ──────────────────────────────────────────────────── */
    .msg {
      font-size: .67rem; text-align: center; margin-top: 10px;
      min-height: 18px; transition: all .3s; letter-spacing: .3px; line-height: 1.6;
    }
    .msg.error   { color: var(--error); }
    .msg.success { color: var(--success); }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 1.5px solid rgba(240,192,128,0.25); border-top-color: var(--accent2);
      border-radius: 50%; animation: spin .7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Back button ──────────────────────────────────────────────── */
    .back-btn {
      display: flex; align-items: center; gap: 7px;
      background: none; border: 1px solid var(--border); border-radius: 10px;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: .63rem; letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 14px; min-height: 40px; cursor: pointer;
      transition: all .25s; margin-bottom: 14px; align-self: flex-start;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover  { border-color: var(--border-warm); color: var(--text); background: rgba(255,235,200,0.04); }
    .back-btn svg    { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* ── Footer ───────────────────────────────────────────────────── */
    .footer {
      width: min(420px, 100%); text-align: center;
      font-size: .59rem; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted2); padding: 16px 0;
      animation: fade-up 1.2s 0.7s both;
    }
    .footer span { color: rgba(232,160,96,0.45); }

    /* ── Social loading overlay ───────────────────────────────────── */
    .social-loading {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(4,2,1,0.78); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .social-loading.show { opacity: 1; pointer-events: all; }
    .social-loading-spinner { width: 36px; height: 36px; border: 2px solid rgba(232,160,96,0.18); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    .social-loading-text { font-size: .70rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

    /* ── Discord gate screen ──────────────────────────────────────── */
    /*
      Shown INSTEAD of the normal login when inside Discord Activity.
      The gate shows a spinner while the SDK authorizes silently.
      If auth fails it shows an error with a retry button.
    */
    #discord-gate {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; width: min(380px, 100%); text-align: center;
      padding: 48px 36px;
      background: rgba(255,228,175,0.047);
      border: 1px solid rgba(255,210,140,0.13);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(48px) saturate(140%);
      -webkit-backdrop-filter: blur(48px) saturate(140%);
      box-shadow: 0 44px 90px rgba(0,0,0,0.6);
      animation: card-rise 0.9s cubic-bezier(.16,1,.3,1) both;
    }
    #discord-gate.active { display: flex; }

    .gate-logo { margin-bottom: 4px; }
    .gate-logo svg { width: 44px; height: 44px; stroke: var(--accent); fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
    .gate-title { font-family: 'Cormorant Garamond', serif; font-size: 1.55rem; font-weight: 300; color: var(--text); }
    .gate-title em { font-style: italic; color: var(--accent); }
    .gate-status { font-size: .70rem; color: var(--muted); letter-spacing: .5px; line-height: 1.75; }
    .gate-spinner { width: 26px; height: 26px; border: 2px solid rgba(232,160,96,0.18); border-top-color: var(--accent); border-radius: 50%; animation: spin .85s linear infinite; }
    .gate-spinner.hidden { display: none; }

    .btn-retry {
      display: none;
      padding: 10px 24px; min-height: 40px;
      background: rgba(232,160,96,0.10); border: 1px solid rgba(232,160,96,0.30);
      border-radius: var(--radius); color: var(--accent2);
      font-family: 'DM Sans', sans-serif; font-size: .68rem;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all .3s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-retry.visible { display: block; }
    .btn-retry:hover { border-color: rgba(232,160,96,.55); background: rgba(232,160,96,0.16); }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; border-radius: 22px; }
      .brand-name { font-size: 1.5rem; }
      .social-row { gap: 8px; }
      .btn-social { font-size: .66rem; letter-spacing: 1px; padding: 11px 10px; }
    }
    @media (max-height: 640px) {
      .card { padding: 26px 26px 22px; }
      .brand { margin-bottom: 16px; }
      .brand-logo { width: 42px; height: 42px; }
      .field { margin-bottom: 8px; }
      .btn-primary { margin-top: 10px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

<!-- ── Background deco (pointer-events:none — will never intercept clicks) ── -->
<div id="deco-layer" aria-hidden="true">
  <canvas id="particle-canvas"></canvas>
  <div id="vignette"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- ── Social auth loading overlay ── -->
<div class="social-loading" id="social-loading" aria-live="polite" aria-atomic="true">
  <div class="social-loading-spinner"></div>
  <div class="social-loading-text" id="social-loading-text">Connecting…</div>
</div>

<!-- ── UI layer ── -->
<div id="ui-layer">

  <!-- ─────────────────────────────────────────────────────────────
       DISCORD ACTIVITY GATE
       Shown when IS_DISCORD is true.
       The SDK authorize() → worker exchange → localStorage flow
       runs entirely here. No Firebase Auth needed in Discord context.
  ──────────────────────────────────────────────────────────────── -->
  <div id="discord-gate" role="status" aria-live="polite">
    <div class="gate-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C12 2 7 7.5 7 12a5 5 0 0010 0c0-1.5-.5-3-1.5-4.5C15 9 14 10 14 10s1-3-2-8z"/>
        <path d="M12 17a2 2 0 01-2-2c0-1.5 2-3.5 2-3.5s2 2 2 3.5a2 2 0 01-2 2z" stroke-width="1"/>
      </svg>
    </div>
    <div class="gate-title">Nexus <em>Study</em> Lab</div>
    <div class="gate-status" id="gate-status">Signing you in with Discord…</div>
    <div class="gate-spinner" id="gate-spinner"></div>
    <button class="btn-retry" id="btn-retry" type="button" aria-label="Retry sign-in">Retry</button>
  </div>

  <!-- ─────────────────────────────────────────────────────────────
       NORMAL WEB LOGIN
       Shown when IS_DISCORD is false (regular browser).
       Google Sign-In and email/password both use Firebase Auth.
       Discord OAuth on web: redirect flow → Cloudflare Worker → custom token.
  ──────────────────────────────────────────────────────────────── -->
  <div id="normal-login" style="display:none; flex-direction:column; align-items:center; width:100%; max-width:420px;">

    <button class="back-btn" id="back-btn" type="button" aria-label="Back to dashboard">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Lab
    </button>

    <div class="card">
      <div class="brand">
        <div class="brand-eyebrow">Your private study space</div>
        <div class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 2C12 2 7 7.5 7 12a5 5 0 0010 0c0-1.5-.5-3-1.5-4.5C15 9 14 10 14 10s1-3-2-8z"/>

/* ----------------------------------------------------------

---------------------------------------------------------- */

async function runDiscordAuth(DiscordSDK) {

  console.log(
    "[NSL] instanceId:",
    DISCORD_INSTANCE_ID
  );

  if (!DISCORD_INSTANCE_ID) {
    setGateError(
      "No Discord instance ID found."
    );
    return;
  }

  console.log(
    "[NSL] DiscordSDK type:",
    typeof DiscordSDK
  );

  
  const sdk = new DiscordSDK(
  DISCORD_APP_ID
);

console.log(
  "[NSL] sdk created WITHOUT instanceId"
);

  console.log(
    "[NSL] sdk created with instanceId:",
    DISCORD_INSTANCE_ID
  );

  try {

    setGateStatus(
      "Connecting to Discord..."
    );

    console.log(
      "[NSL] before sdk.ready()"
    );

    await Promise.race([
      sdk.ready(),
      new Promise((_, reject) =>
        setTimeout(
          () => reject(
            new Error(
              "sdk.ready timeout"
            )
          ),
          10000
        )
      )
    ]);

    console.log(
      "[NSL] after sdk.ready()"
    );

    setGateStatus(
      "Requesting access..."
    );

    const authResult =
      await sdk.commands.authorize({
        client_id:
          DISCORD_APP_ID,
        response_type:
          "code",
        state: "",
        prompt: "none",
        scope: ["identify"]
      });

    const code =
      authResult.code;

    console.log(
      "[NSL] got code:",
      !!code
    );

    if (!code) {
      throw new Error(
        "No authorization code"
      );
    }

    setGateStatus(
      "Verifying identity..."
    );

    const tokenRes =
      await fetch(
        WORKER_PREFIX +
          "/discord-token",
        {
          method: "POST",
          headers: {
            "Content-Type":
              "application/json"
          },
          body: JSON.stringify({
            code: code
          })
        }
      );

    console.log(
      "[NSL] worker status:",
      tokenRes.status
    );

    if (!tokenRes.ok) {
      const errText =
        await tokenRes.text();

      throw new Error(
        "Worker " +
          tokenRes.status +
          ": " +
          errText
      );
    }

    const tokenData =
      await tokenRes.json();

    const access_token =
      tokenData.access_token;

    if (!access_token) {
      throw new Error(
        "No access token returned"
      );
    }

    
    setGateStatus(
      "Authenticating..."
    );

    const auth =
      await sdk.commands.authenticate({
        access_token:
          access_token
      });

    const discordUser =
      auth.user;

    console.log(
      "[NSL] authenticated:",
      discordUser.username
    );

    localStorage.setItem(
      "nsl_user",
      JSON.stringify({
        uid:
          "discord_" +
          discordUser.id,
        name:
          discordUser.global_name ||
          discordUser.username,
        email: "",
        guest: false,
        discord_id:
          discordUser.id,
        discord_user:
          discordUser.username,
        access_token:
          access_token
      })
    );

    setGateStatus(
      "Welcome " +
      (
        discordUser.global_name ||
        discordUser.username
      )
    );

    setTimeout(() => {
      window.location.href =
        "streak.html";
    }, 500);

  } catch (err) {

    console.error(
      "[NSL] Discord auth failed:",
      err
    );

    setGateError(
      String(
        err.message || err
      )
    );

    const retryBtn =
      document.getElementById(
        "btn-retry"
      );

    if (retryBtn) {

      retryBtn.classList.add(
        "visible"
      );

      retryBtn.onclick = () => {

        retryBtn.classList.remove(
          "visible"
        );

        runDiscordAuth(
          DiscordSDK
        );
      };
    }
  }
}

if (!IS_DISCORD) {

console.log('FirebaseBundle:', FB);
console.log('Keys:', Object.keys(FB));
console.log('signInWithCustomToken:', typeof FB.signInWithCustomToken);
    FB.initializeApp({

      storageBucket:     'nexus-study-lab.firebasestorage.app',
      messagingSenderId: '610669979476',
      appId:             '1:610669979476:web:de9af7a8da3cb71f720ac1',
    });

    auth = FB.getAuth();

    /* Handle Google redirect result (popup-blocked fallback) */
    FB.getRedirectResult(auth).then(function(result) {
      if (result && result.user) {
        saveUser(result.user);

      }
    }).catch(function(err) {
      if (err.code !== 'auth/no-auth-event') setMsg(friendlyError(err.code), 'error');

    FB.onAuthStateChanged(auth, function(user) {

  /* ── Helpers ── */
  function saveUser(user, nameOverride) {
    localStorage.setItem('nsl_user', JSON.stringify({
      uid:   user.uid,
      email: user.email   || '',
      name:  nameOverride || user.displayName || (user.email ? user.email.split('@')[0] : 'Scholar'),
      photo: user.photoURL || null,
      guest: false,
    }));
  }

  function goTo(url) {
    document.body.style.opacity    = '0';
    document.body.style.transition = 'opacity 0.5s ease';
    setTimeout(function() { window.location.href = url; }, 520);
  }

  function setMsg(text, type) {
    var el     = document.getElementById('msg');
    el.textContent = text;
    el.className   = 'msg' + (type ? ' ' + type : '');
  }
  function clearMsg() { setMsg('', ''); }

  function setLoading(on) {
    var btn      = document.getElementById('main-btn');
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span>One moment…'
      : (currentTab === 'register' ? 'Create Account' : 'Enter the Lab');
  }

  function showOverlay(text) {
    document.getElementById('social-loading-text').textContent = text || 'Connecting…';
    document.getElementById('social-loading').classList.add('show');
  }
  function hideOverlay() {
    document.getElementById('social-loading').classList.remove('show');
  }

  function friendlyError(code) {
    var map = {
      'auth/invalid-email':          "That email address doesn't look right.",
      'auth/user-not-found':         'No account found with that email.',
      'auth/wrong-password':         'Wrong password — try again.',
      'auth/invalid-credential':     'Email or password is incorrect.',
      'auth/email-already-in-use':   'An account with that email already exists.',
      'auth/weak-password':          'Password must be at least 6 characters.',
      'auth/too-many-requests':      'Too many attempts — please wait a moment.',
      'auth/network-request-failed': 'Network error — check your connection.',
      'auth/popup-closed-by-user':   'Sign-in window was closed. Try again.',
      'auth/popup-blocked':          'Popup was blocked — trying redirect…',
      'auth/cancelled-popup-request':'Sign-in was cancelled.',
      'auth/operation-not-allowed':  'This sign-in method is not currently enabled.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  /* ── Tab switching ── */
  var currentTab = 'login';

  function switchTab(tab) {
    currentTab   = tab;
    var isReg    = (tab === 'register');
    document.getElementById('tab-login').classList.toggle('active', !isReg);
    document.getElementById('tab-login').setAttribute('aria-selected', String(!isReg));
    document.getElementById('tab-register').classList.toggle('active', isReg);

    document.getElementById('forgot-row').style.display          = isReg ? 'none'  : 'block';
    var pwd = document.getElementById('login-password');

    if (isReg) {
      btn.textContent = 'Create Account';
      pwd.setAttribute('autocomplete', 'new-password');
      pwd.setAttribute('placeholder',  'Choose a password');
    } else {
      btn.textContent = 'Enter the Lab';
      pwd.setAttribute('autocomplete', 'current-password');
      pwd.setAttribute('placeholder',  '••••••••');
    }
    clearMsg();
  }

  /* ── Google Sign-In ── */
  function handleGoogleLogin() {
    if (!auth || !FB) return;
    clearMsg();
    document.getElementById('btn-google').disabled = true;
    showOverlay('Connecting to Google…');
    var provider = new FB.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');
    FB.signInWithPopup(auth, provider).then(function(result) {
      saveUser(result.user);
      hideOverlay();
      goTo('streak.html');
    }).catch(function(err) {
      if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
        setMsg(friendlyError(err.code), 'error');
        FB.signInWithRedirect(auth, provider).catch(function(e2) {
          hideOverlay();
          document.getElementById('btn-google').disabled = false;
          setMsg(friendlyError(e2.code), 'error');
        });
      } else {
        hideOverlay();
        document.getElementById('btn-google').disabled = false;
        setMsg(friendlyError(err.code), 'error');
      }
    });
  }

  /* ── Discord OAuth on web (redirect → Worker → Firebase custom token) ── */
  function handleDiscordWebLogin() {
    clearMsg();
    showOverlay('Redirecting to Discord…');
    var state = Math.random().toString(36).slice(2) + Date.now().toString(36);
    sessionStorage.setItem('discord_oauth_state', state);
    var params = new URLSearchParams({
      client_id:     DISCORD_APP_ID,
      redirect_uri:  DISCORD_REDIRECT_URI,
      response_type: 'code',
      scope:         'identify email',
      state:         state,
    });
    window.location.href = 'https://discord.com/api/oauth2/authorize?' + params.toString();
  }

  async function handleDiscordCallback() {
    var urlParams = new URLSearchParams(window.location.search);
    var code      = urlParams.get('code');
    var state     = urlParams.get('state');
    if (!code) return;

    history.replaceState({}, '', window.location.pathname);

    var savedState = sessionStorage.getItem('discord_oauth_state');
    sessionStorage.removeItem('discord_oauth_state');
    if (state !== savedState) {
      setMsg('Discord sign-in failed — security check failed. Try again.', 'error');
      return;
    }

    showOverlay('Finishing Discord sign-in…');
    try {
      var res = await fetch(WORKER_PREFIX + '/discord-auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ code: code, redirect_uri: DISCORD_REDIRECT_URI }),
      });
      if (!res.ok) throw new Error('Worker responded with ' + res.status);
      var data          = await res.json();
      var firebaseToken = data.firebaseToken;
      var discordUser   = data.discordUser;
      var result        = await FB.signInWithCustomToken(auth, firebaseToken);
      saveUser(result.user, discordUser && discordUser.username);
      hideOverlay();
      goTo('streak.html');
    } catch (err) {
      hideOverlay();
      setMsg('Discord sign-in failed — ' + (err.message || 'unknown error'), 'error');
    }
  }

  /* ── Email sign-in / register ── */
  function handleEmailSubmit() {
    if (!auth || !FB) return;
    var email = document.getElementById('login-email').value.trim();
    var pass  = document.getElementById('login-password').value;
    clearMsg();
    if (!email || !pass)      { setMsg('Please fill in all fields.', 'error'); return; }
    if (!email.includes('@')) { setMsg('Enter a valid email address.', 'error'); return; }
    if (pass.length < 6)      { setMsg('Password must be at least 6 characters.', 'error'); return; }
    if (currentTab === 'register') {
      var name = document.getElementById('reg-name').value.trim();
      if (!name) { setMsg('Please enter your name.', 'error'); return; }
      doRegister(name, email, pass);
    } else {
      doLogin(email, pass);
    }
  }

  function doLogin(email, pass) {
    setLoading(true);
    FB.signInWithEmailAndPassword(auth, email, pass).then(function(cred) {
      saveUser(cred.user);
      setMsg('Welcome back ✶', 'success');
      setTimeout(function() { goTo('streak.html'); }, 500);
    }).catch(function(err) {
      setMsg(friendlyError(err.code), 'error');
      setLoading(false);
    });
  }

  function doRegister(name, email, pass) {
    setLoading(true);
    FB.createUserWithEmailAndPassword(auth, email, pass).then(function(cred) {
      return FB.updateProfile(cred.user, { displayName: name }).then(function() {
        return cred.user;
      });
    }).then(function(user) {
      saveUser(user, name);
      setMsg('Account created ✶', 'success');
      setTimeout(function() { goTo('streak.html'); }, 500);
    }).catch(function(err) {
      setMsg(friendlyError(err.code), 'error');
      setLoading(false);
    });
  }

  function doForgotPassword() {
    if (!auth || !FB) return;
    var email = document.getElementById('login-email').value.trim();
    if (!email) { setMsg('Enter your email address above first.', 'error'); return; }
    FB.sendPasswordResetEmail(auth, email).then(function() {
      setMsg('Reset email sent — check your inbox.', 'success');
    }).catch(function(err) {
      setMsg(friendlyError(err.code), 'error');
    });
  }

  function enterAsGuest() {
    localStorage.setItem('nsl_user', JSON.stringify({ guest: true }));
    goTo('streak.html');
  }

  /* ── Event listeners (no inline handlers — CSP compliant) ── */
  document.getElementById('btn-google').addEventListener('click',       handleGoogleLogin);
  document.getElementById('btn-discord').addEventListener('click',      handleDiscordWebLogin);
  document.getElementById('main-btn').addEventListener('click',         handleEmailSubmit);
  document.getElementById('guest-btn').addEventListener('click',        enterAsGuest);
  document.getElementById('forgot-btn').addEventListener('click',       doForgotPassword);
  document.getElementById('back-btn').addEventListener('click',         function() { goTo('streak.html'); });
  document.getElementById('tab-login').addEventListener('click',        function() { switchTab('login'); });
  document.getElementById('tab-register').addEventListener('click',     function() { switchTab('register'); });
  document.getElementById('reg-name').addEventListener('keydown',       function(e) { if (e.key === 'Enter') document.getElementById('login-email').focus(); });
  document.getElementById('login-email').addEventListener('keydown',    function(e) { if (e.key === 'Enter') document.getElementById('login-password').focus(); });
  document.getElementById('login-password').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleEmailSubmit(); });

} /* END !IS_DISCORD */


/* ═══════════════════════════════════════════════════════════════════
   PARTICLE CANVAS — runs in both contexts, purely visual
═══════════════════════════════════════════════════════════════════ */
(function initParticles() {
  var canvas = document.getElementById('particle-canvas');
  var ctx    = canvas.getContext('2d');
  var pts    = [];
  var W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 55; i++) {
    pts.push({
      x:  Math.random() * window.innerWidth,
      y:  Math.random() * window.innerHeight,
      r:  Math.random() * 1.1 + 0.28,
      dx: (Math.random() - 0.5) * 0.14,
      dy: (Math.random() - 0.5) * 0.14,
      tw: Math.random() * Math.PI * 2,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var p, i = 0; i < pts.length; i++) {
      p = pts[i];
      p.x += p.dx; p.y += p.dy; p.tw += 0.015;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      var a = 0.13 + 0.18 * Math.sin(p.tw);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle   = 'rgba(232,160,96,' + a + ')';
      ctx.shadowColor = 'rgba(232,160,96,0.45)';
      ctx.shadowBlur  = 5;
      ctx.fill();
      ctx.shadowBlur  = 0;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

</script>
